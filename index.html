<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de tâches</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex justify-center p-6">

    <div class="w-full max-w-2xl">
        <div class="bg-white rounded-xl shadow-lg p-6">

            <h1 class="text-3xl font-bold text-center mb-6">
                Gestionnaire de tâches
            </h1>

            <div class="flex gap-2">
                <input
                    id="taskInput"
                    type="text"
                    placeholder="Ajouter une tâche..."
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                <button
                    id="addBtn"
                    class="bg-blue-600 text-white px-5 py-3 rounded-lg hover:bg-blue-700 transition"
                >
                    Ajouter
                </button>
            </div>

            <h2 class="text-xl font-bold mt-6 mb-3">
                Tâches
            </h2>

            <ol id="taskList" class="space-y-3 list-decimal pl-8"></ol>

            <div id="trashSection" class="hidden">
                <h2 class="text-xl font-bold mt-10 mb-3 text-red-600">
                    Corbeille
                </h2>

                <ol id="trashList" class="space-y-3 list-decimal pl-8"></ol>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
